<!--
PURPOSE: Define a estrutura visual responsiva das paginas publicas de recebimento.
INPUTS: Titulo e blocos Jinja das paginas filhas.
OUTPUTS: Documento HTML UTF-8 com estilo compartilhado.
DEPS: Jinja2 autoescape, navegador do destinatario.
SEE: api/main.py, api/templates/recebimento_form.html
-->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SCLME{% endblock %}</title>
  <style>
    :root { color-scheme: light; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f4f6f8; color: #17212b; }
    main { max-width: 760px; margin: 0 auto; padding: 24px 16px 48px; }
    .card { background: #fff; border: 1px solid #d9e0e7; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgb(22 34 45 / 7%); }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    h2 { font-size: 1.1rem; margin: 28px 0 12px; }
    p { line-height: 1.5; }
    .muted { color: #536271; }
    .notice { padding: 14px; border-radius: 6px; margin: 16px 0; }
    .warning { background: #fff4d8; border: 1px solid #e7c971; }
    .error { background: #fde9e8; border: 1px solid #db817b; color: #7c1f1c; }
    .success { background: #e3f5e9; border: 1px solid #82bc92; color: #155b2b; }
    dl { display: grid; grid-template-columns: minmax(130px, 1fr) 2fr; gap: 8px 16px; margin: 0; }
    dt { font-weight: 700; }
    dd { margin: 0; overflow-wrap: anywhere; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { border-bottom: 1px solid #d9e0e7; padding: 10px 6px; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
    th { background: #f6f8fa; }
    label { display: block; font-weight: 700; margin: 16px 0 6px; }
    input, textarea, button { box-sizing: border-box; width: 100%; font: inherit; }
    input, textarea { padding: 12px; min-height: 46px; border: 1px solid #9aa8b5; border-radius: 6px; }
    textarea { min-height: 110px; resize: vertical; }
    button { margin-top: 22px; min-height: 50px; border: 0; border-radius: 6px; background: #0b6e4f; color: #fff; font-weight: 700; cursor: pointer; }
    button:hover { background: #07533c; }
    @media (max-width: 560px) { .card { padding: 18px; } dl { grid-template-columns: 1fr; gap: 4px; } dd { margin-bottom: 10px; } th, td { font-size: .82rem; } }
  </style>
</head>
<body>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
